version: "3.9"
services:
  nginx:
    image: nginx:alpine
    container_name: faris-nginx
    ports: ["80:80","443:443"]
    volumes: ["./nginx/nginx.conf:/etc/nginx/nginx.conf",
              "./nginx/ssl:/etc/nginx/ssl",
              "./frontend/dist:/var/www"]
    networks: [faris]

  frontend:
    build: {context: frontend, dockerfile: Dockerfile}
    volumes: ["./frontend/dist:/app/dist"]
    networks: [faris]

  backend:
    build: {context: backend, dockerfile: Dockerfile}
    env_file: .env
    ports: ["3001:3001"]
    networks: [faris]

  ai-core:
    build: {context: ai-core, dockerfile: Dockerfile}
    runtime: nvidia                   # GPU
    env_file: .env
    ports: ["8000:8000"]
    networks: [faris]

  mongo:
    image: mongo:7
    env_file: .env
    volumes: ["mongo_data:/data/db"]
    networks: [faris]

  redis:
    image: redis:7-alpine
    networks: [faris]

  tor:
    image: dperson/tor
    container_name: faris-onion
    command: -SO
    volumes: ["./torrc:/etc/tor/torrc","./hidden_service:/var/lib/tor/hidden_service"]
    networks: [faris]

volumes:
  mongo_data:

networks:
  faris:
